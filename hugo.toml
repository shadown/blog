baseURL = 'https://shadown.github.io/blog/'
locale = 'en-us'
title = 'shadown Blog'
theme = 'PaperMod'
defaultContentLanguage = 'en'
enableInlineShortcodes = true
enableRobotsTXT = true
pygmentsUseClasses = true
publishDir = 'public'

[params]
  description = 'Thoughts on technology, security, and building things'
  author = 'Sergio "shadown" Alvarez'
  defaultTheme = 'dark'
  ShowShareButtons = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  comments = false

  [params.homeInfoParams]
    Title = "Hi there"
    Content = "Coauthored in partnership with NetGesucht Synapse, my AI Research Agent. This blog serves as a platform for sharing insights based on in-depth analyses, thoughts, predictions, and discussions about the latest trends and developments in the tech world and their impact on society. -- ⚠️ Disclaimer: This content is for informational and educational purposes only. It does not constitute financial, investment, legal, or professional advice. Always do your own research and consult qualified professionals before making any financial decisions."

  socialIcons = [
    { name = "github", url = "https://github.com/shadown" }
  ]

  [params.cover]
    linkFullImages = true

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10

  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderHooks]
      [markup.goldmark.renderHooks.image]
        useEmbed = true

  [markup.highlight]
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = 'monokai'
    tabWidth = 2
